name: Pages

on:
  push:
    branches: [main]
    paths:
      - README.md
      - README.zh.md
      - PROGRESS.md
      - docs/**
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - scripts/ensure-nojekyll.mjs
      - scripts/update-docs-benchmarks.mjs
      - .github/workflows/pages.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.10.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24.11.0'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare benchmark snapshot
        shell: bash
        run: |
          set +e
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          export PATH="$HOME/.moon/bin:$PATH"
          moon update
          python -m pip install --upgrade pip tokenizers numpy
          python scripts/bench_compare.py --target native --quick --corpus mixed \
            --json-out reports/bench-native-mixed.json
          status=$?
          if [ "$status" -eq 0 ]; then
            node scripts/update-docs-benchmarks.mjs reports/bench-native-mixed.json
            node scripts/gen-bench-charts.mjs reports/bench-native-mixed.json
          else
            echo "Benchmark snapshot generation failed; using checked-in fallback JSON."
          fi

      - name: Build site
        run: pnpm docs:build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: gh-pages-deploy

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
