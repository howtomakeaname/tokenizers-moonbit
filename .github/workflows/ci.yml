name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install MoonBit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Show MoonBit version
        run: moon version

      - name: Check formatting
        run: |
          if moon fmt --help | grep -q -- '--deny-warn'; then
            moon fmt --deny-warn
          else
            moon fmt --check
          fi

      - name: Check diagnostics
        run: moon check --deny-warn

      - name: Generate public interfaces
        run: |
          if moon info --help | grep -q -- '--deny-warn'; then
            moon info --deny-warn
          else
            moon info
          fi
          git diff --exit-code -- 'src/**/*.mbti'

      - name: Run tests
        run: |
          moon test --target wasm
          moon test --target wasm-gc
          moon test --target js
          moon test --target native

      - name: Install Python benchmark dependencies
        run: python3 -m pip install tokenizers

      - name: Compile Python helper scripts
        run: python3 -m py_compile scripts/*.py

      - name: Quick benchmark smoke
        run: python3 scripts/bench_compare.py --quick --target native
