name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  moonbit:
    name: MoonBit (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [native, js, wasm, wasm-gc]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install MoonBit CLI
        shell: bash
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Show MoonBit version
        run: moon version

      # Required for registry deps such as moonbitlang/x. GitHub runners may
      # start with a stale or empty registry index, which makes `moon check`
      # fail before dependency resolution.
      - name: Update MoonBit registry index
        run: moon update

      - name: Check
        run: moon check --target ${{ matrix.target }}

      - name: Test
        run: moon test --target ${{ matrix.target }}

  python-scripts:
    name: Python scripts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Compile scripts
        run: |
          python -m py_compile \
            scripts/bench_python.py \
            scripts/fetch_models.py \
            scripts/gen_expected.py \
            scripts/gen_expected_bert.py \
            scripts/gen_parity.py

  optional-parity-smoke:
    name: Optional parity smoke
    runs-on: ubuntu-latest
    needs: [moonbit, python-scripts]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install MoonBit CLI
        shell: bash
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Update MoonBit registry index
        run: moon update

      - name: Install Python tokenizers
        run: python -m pip install --upgrade pip tokenizers

      # Keep this job small and deterministic. The full 31-model matrix is for
      # local/nightly runs because several upstream HF repos are large, gated or
      # occasionally renamed.
      - name: Fetch smoke fixtures
        run: python scripts/fetch_models.py gpt2 bert t5

      - name: Generate parity expectations
        run: python scripts/gen_parity.py gpt2 bert t5

      - name: Run native parity smoke
        run: moon test --target native
