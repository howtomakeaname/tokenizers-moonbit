name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  moonbit:
    name: MoonBit (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [native, js, wasm, wasm-gc]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install MoonBit CLI
        shell: bash
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Show MoonBit version
        run: moon version

      # Required for registry deps such as moonbitlang/x and moonbitlang/async.
      # GitHub runners may start with a stale or empty registry index, which makes
      # `moon check` fail before dependency resolution.
      - name: Update MoonBit registry index
        run: moon update

      - name: Check diagnostics
        run: moon check --deny-warn --target ${{ matrix.target }}

      - name: Run tests
        run: moon test --deny-warn --target ${{ matrix.target }}

  release-gates:
    name: Release gates
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install MoonBit CLI
        shell: bash
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Show MoonBit version
        run: moon version

      - name: Update MoonBit registry index
        run: moon update

      - name: Check formatting
        run: |
          if moon fmt --help | grep -q -- '--deny-warn'; then
            moon fmt --deny-warn
          else
            moon fmt --check
          fi

      - name: Check diagnostics
        run: moon check --deny-warn

      - name: Generate public interfaces
        run: |
          if moon info --help | grep -q -- '--deny-warn'; then
            moon info --deny-warn
          else
            moon info
          fi
          git diff --exit-code -- 'src/**/*.mbti'

      - name: Check package metadata
        run: moon package

  python-scripts:
    name: Python scripts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Compile scripts
        run: python -m py_compile scripts/*.py

  optional-parity-smoke:
    name: Optional parity smoke
    runs-on: ubuntu-latest
    needs: [moonbit, python-scripts]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install MoonBit CLI
        shell: bash
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Update MoonBit registry index
        run: moon update

      - name: Install Python tokenizers
        run: python -m pip install --upgrade pip tokenizers

      # Keep this job small and deterministic. The full model matrix is for
      # local/nightly runs because several upstream HF repos are large, gated or
      # occasionally renamed.
      - name: Fetch smoke fixtures
        run: python scripts/fetch_models.py gpt2 bert t5

      - name: Generate parity expectations
        run: python scripts/gen_parity.py gpt2 bert t5

      - name: Run native parity smoke
        run: moon test --deny-warn --target native

  bench-smoke:
    name: HF comparison benchmark smoke
    runs-on: ubuntu-latest
    needs: [moonbit, python-scripts]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install MoonBit CLI
        shell: bash
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Update MoonBit registry index
        run: moon update

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python tokenizers
        run: python -m pip install --upgrade pip tokenizers

      # Same-host MoonBit/HF comparison smoke. Full `--corpus all` remains a
      # local/nightly perf task; CI guards benchmark wiring and obvious regressions.
      - name: Fetch quick benchmark fixtures
        run: python scripts/fetch_models.py gpt2 bert llama Qwen2.5 phi4_mini qwen3_coder

      - name: Run MoonBit vs HF benchmark smoke
        run: |
          mkdir -p reports
          python scripts/bench_compare.py --target native --quick --corpus mixed \
            --json-out reports/bench-native-mixed.json

      - name: Upload benchmark report
        uses: actions/upload-artifact@v4
        with:
          name: bench-native-mixed
          path: reports/bench-native-mixed.json
